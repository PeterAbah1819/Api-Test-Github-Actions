name: Testing Things API test suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'


    - name: Install Newman
      run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra


    - name: Run API tests
      run: |
        newman run "collections/Testing Things.postman_collection.json" \
        --environment "environments/Testing Things.postman_environment.json" \
        --env-var "baseUrl=${{ secrets.BASE_URL }}" \
        --env-var "baseUrl-incorrect=${{ secrets.INCORRECT_BASE_URL }}" \
        -r cli,htmlextra \
        --reporter-htmlextra-export reports/Testing-Things-test-results.html \
        --timeout-request 30000 \
        --suppress-exit-code

    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Testing-Things-test-results
        path: reports/

    
